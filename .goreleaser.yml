version: 2

env:
  - CGO_ENABLED=0

before:
  hooks:
    - go mod tidy

builds:
  - id: podspawn
    binary: podspawn
    main: .
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/podspawn/podspawn/cmd.Version={{.Version}}
      - -X github.com/podspawn/podspawn/cmd.Commit={{.ShortCommit}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
  groups:
    - title: Features
      regexp: "^.*feat.*:+.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix.*:+.*$"
      order: 1
    - title: Others
      order: 999

nfpms:
  - id: podspawn
    package_name: podspawn
    vendor: podspawn
    homepage: https://github.com/podspawn/podspawn
    maintainer: podspawn <noreply@podspawn.dev>
    description: Ephemeral SSH dev containers via native sshd
    license: AGPL-3.0
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: packaging/systemd/podspawn-cleanup.service
        dst: /etc/systemd/system/podspawn-cleanup.service
        type: config
      - src: packaging/systemd/podspawn-cleanup.timer
        dst: /etc/systemd/system/podspawn-cleanup.timer
        type: config

homebrew_casks:
  - name: podspawn
    ids:
      - default
    repository:
      owner: podspawn
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://podspawn.dev
    description: Ephemeral SSH dev containers via native sshd
    binaries:
      - podspawn
    url:
      verified: "github.com/podspawn/podspawn"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/podspawn"]
          end

release:
  github:
    owner: podspawn
    name: podspawn
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
