# Go development environment for podspawn
#
# Usage:
#   podspawn init --template go
#   # or copy this file to your repo as podfile.yaml
#   podspawn dev
#
# Includes golangci-lint, delve (debugger), and air (live reload).
# Extend or trim the packages list to match your project.

extends: ubuntu-dev

packages:
  - go@1.25.0
  - make

shell: /bin/bash

env:
  GOPATH: /home/user/go
  GOBIN: /home/user/go/bin

ports:
  expose: [8080]
  strategy: auto

resources:
  cpus: 2.0
  memory: 4g

# Runs once when the container is first created.
on_create: |
  go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
  go install github.com/go-delve/delve/cmd/dlv@latest
  go install github.com/air-verse/air@latest
  if [ -f go.mod ]; then go mod download; fi

on_start: |
  echo "Go $(go version | awk '{print $3}') ready"
