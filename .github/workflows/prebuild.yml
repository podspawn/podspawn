name: Prebuild Container Images

on:
  workflow_dispatch:
    inputs:
      podfile:
        description: 'Path to Podfile (default: podfile.yaml in repo root)'
        required: false
        default: ''

# Reusable template for repo owners who want to prebuild their Podfile images
# on push. Copy this workflow to your repo and adjust the paths filter.
#
# REQUIRES a Blacksmith runner for the colocated cache. On GitHub-hosted
# runners, swap:
#   runs-on: ubuntu-latest
# (the Blacksmith layer cache from setup-docker-builder is irrelevant here -
# see the note on the prebuild step below.)
#
# Usage in your repo:
#   on:
#     push:
#       branches: [main]
#       paths: ['podfile.yaml']
#
# The built image is pushed to ghcr.io and can be pulled by podspawn dev
# when the image tag matches the Podfile content hash.

permissions:
  contents: read
  packages: write

jobs:
  prebuild:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # podspawn prebuild detects `docker buildx` and routes through it when
      # available (internal/runtime/docker_buildx.go). This step registers a
      # Blacksmith remote builder as the active buildx context so the build
      # uses Blacksmith's persistent layer cache.
      - uses: useblacksmith/setup-docker-builder@722e97d12b1d06a961800dd6c05d79d951ad3c80  # v1

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install podspawn
        run: |
          curl -sSfL https://podspawn.dev/install.sh | sh
          sudo mv podspawn /usr/local/bin/

      - name: Build and tag image
        env:
          PODFILE: ${{ github.event.inputs.podfile }}
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          if [ -z "$PODFILE" ]; then
            podspawn prebuild --tag "$IMAGE"
          else
            podspawn prebuild --podfile "$PODFILE" --tag "$IMAGE"
          fi

      - name: Push image
        env:
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: docker push "$IMAGE"
