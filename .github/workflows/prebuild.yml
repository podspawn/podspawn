name: Prebuild Container Images

on:
  workflow_dispatch:
    inputs:
      podfile:
        description: 'Path to Podfile (default: podfile.yaml in repo root)'
        required: false
        default: ''

# Reusable template for repo owners who want to prebuild their Podfile images
# on push. Copy this workflow to your repo and adjust the paths filter.
#
# Usage in your repo:
#   on:
#     push:
#       branches: [main]
#       paths: ['podfile.yaml']
#
# The built image is pushed to ghcr.io and can be pulled by podspawn dev
# when the image tag matches the Podfile content hash.

permissions:
  contents: read
  packages: write

jobs:
  prebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install podspawn
        run: |
          curl -sSfL https://podspawn.dev/install.sh | sh
          sudo mv podspawn /usr/local/bin/

      - name: Build and tag image
        run: |
          PODFILE="${{ github.event.inputs.podfile }}"
          if [ -z "$PODFILE" ]; then
            podspawn prebuild --tag ghcr.io/${{ github.repository }}:${{ github.sha }}
          else
            podspawn prebuild --podfile "$PODFILE" --tag ghcr.io/${{ github.repository }}:${{ github.sha }}
          fi

      - name: Push image
        run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
